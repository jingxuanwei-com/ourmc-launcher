name: 构建与发布

on:
  push:  # 任何分支 push + 任何 v* 标签 push 都触发
    tags:
      - "v*"
    branches:
      - "**"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 还原依赖
        run: dotnet restore

      - name: 发布（单文件自包含）
        run: dotnet publish -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:IncludeAllContentForSelfExtract=true -o ./publish

      - name: 上传构建产物（每次 push 都可下载）
        uses: actions/upload-artifact@v4
        with:
          name: ourmclauncher.exe
          path: ./publish/ourmclauncher.exe

      - name: 创建 Release（原始 exe，仅标签触发）
        if: github.ref_type == 'tag'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: "./publish/ourmclauncher.exe"
          generateReleaseNotes: true
          body: |
            ## OML Launcher ${{ github.ref_name }}

            ### 使用说明
            下载 `ourmclauncher.exe`，双击运行即可。
            已内置 .NET 8 运行时 + WebView2 原生库，无需额外安装。

            ### 系统要求
            - Windows 10/11 64位
            - Java 8+（启动游戏需要）

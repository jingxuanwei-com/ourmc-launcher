name: 构建发布

on:
  push: # 任意分支提交都触发
  pull_request:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 还原依赖
        run: dotnet restore

      - name: 发布（单文件自包含）
        run: dotnet publish -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ourmclauncher.exe
          path: ./publish/ourmclauncher.exe

      - name: 创建 Release（仅打标签时触发）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./publish/ourmclauncher.exe
          generate_release_notes: true
          body: |
            ## OML Launcher ${{ github.ref_name }}

            ### 使用说明
            下载 `ourmclauncher.exe`，双击运行即可。
            已内置 .NET 8 运行时，无需额外安装。

            ### 系统要求
            - Windows 10/11 64位
            - 系统已安装 WebView2 Runtime（Win11 自带，Win10 通常已预装）
            - Java 8+（启动游戏需要）
